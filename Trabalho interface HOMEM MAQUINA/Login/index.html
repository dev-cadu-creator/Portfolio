<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- Adicionando Font Awesome para os ícones das redes sociais -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="container-login">
        <h1>Login</h1>
        
        <!-- Redirecionando para o painel financeiro -->
        <form action="../App de entregas/index.html" method="GET">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha" required>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <!-- Nova Seção: Login Social -->
        <div class="separador-social">
            <span>ou acesse com</span>
        </div>
        
        <div class="botoes-sociais">
            <button class="btn-social google" type="button">
                <i class="fa-brands fa-google"></i> Google
            </button>
            <button class="btn-social facebook" type="button">
                <i class="fa-brands fa-facebook-f"></i> Facebook
            </button>
            <button class="btn-social github" type="button">
                <i class="fa-brands fa-github"></i> GitHub
            </button>
        </div>

        <!-- Links de Rodapé -->
        <p class="links-rodape">
            <a href="../Recuperar/index.html"><u>Esqueci minha senha</u></a><br>
            <a href="../Novo user/index.html"><u>Cadastrar novo usuário</u></a><br>
        </p>
    </main>
</body>
</html>
