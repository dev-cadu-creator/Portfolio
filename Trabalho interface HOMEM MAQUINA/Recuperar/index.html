<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h2>Redefinir Senha</h2>
            <p>Deu branco? Manda seu e-mail cadastrado aí que a gente te envia um link para criar uma senha nova.</p>

            <form action="/recuperar-senha" method="POST">
                
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>

                <button type="submit" class="btn-login">Enviar Recuperação</button>
                
            </form>

            <div class="links-uteis">
                <p>Lembrou a senha? <a href="../Login/index.html">Voltar para o login</a></p>
            </div>
        </div>
    </div>

</body>
</html>
