<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Novo Usuário</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome para os ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h2>Criar Conta</h2>
            <p>Preencha os dados para se cadastrar.</p>

            <!-- Redirecionando para o painel financeiro temporariamente para teste de fluxo -->
            <form action="financeiro.html" method="GET">
                
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
                </div>

                <div class="input-group">
                    <label for="confirmaSenha">Confirmar Senha</label>
                    <input type="password" id="confirmaSenha" name="confirmaSenha" placeholder="Repita a senha" required>
                </div>

                <button type="submit" class="btn-login">Cadastrar</button>
                
            </form>

            <!-- Nova Seção: Cadastro Social -->
            <div class="separador-social">
                <span>ou cadastre-se com</span>
            </div>
            
            <div class="botoes-sociais">
                <button class="btn-social google" type="button">
                    <i class="fa-brands fa-google"></i> Google
                </button>
                <button class="btn-social facebook" type="button">
                    <i class="fa-brands fa-facebook-f"></i> Facebook
                </button>
                <button class="btn-social github" type="button">
                    <i class="fa-brands fa-github"></i> GitHub
                </button>
            </div>

            <div class="links-uteis">
                <p>Já tem uma conta? <a href="../Login/index.html">Faça login aqui</a></p>
            </div>
        </div>
    </div>

</body>
</html>
